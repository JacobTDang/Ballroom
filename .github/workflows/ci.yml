name: CI

on:
  pull_request:
  push:
    branches: [main]

# Every job below runs in parallel by default — GitHub Actions only
# serializes jobs that declare `needs:`, and none of these do, since
# none actually depend on another job's output.
jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false # no go.sum yet (stdlib-only); re-enable once real deps land
      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi
      - name: go vet
        run: go vet ./cmd/... ./internal/...
      - name: go build
        run: go build ./cmd/... ./internal/...

  # Everything Go EXCEPT internal/preflight and internal/config, which get
  # their own focused "ollama" job below — `go list` excludes them by
  # package path rather than an enumerated include-list, so a new package
  # added anywhere else is automatically covered here without anyone
  # having to remember to wire it in.
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: go test
        run: |
          pkgs=$(go list ./cmd/... ./internal/... | grep -v '/internal/preflight$' | grep -v '/internal/config$')
          go test $pkgs

  # Ollama integration: model listing/validation (internal/preflight) and
  # the persisted tutor-model settings + verified model tags
  # (internal/config) — issues #19, #20, #21. Split out from go-test so a
  # failure here reads as "something about Ollama model handling broke",
  # not lost in the general test list.
  ollama:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: go test (preflight + config)
        run: go test -v ./internal/preflight/... ./internal/config/...

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck docker/entrypoint.sh tutor/chat.sh tutor/chat_test.sh

  # tutor/chat.sh's own test suite (issues #22, #23, #24, #25): file
  # context injection, the comprehension check, highlight-directive
  # parsing, and the live nvim RPC checks (escaping/injection safety,
  # toggle) — the latter need a real nvim binary, hence installing it
  # here rather than in shellcheck, which is lint-only.
  tutor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install neovim
        # Without a real nvim binary, tutor/chat_test.sh's live RPC checks
        # (the actual verification that untrusted directive content can't
        # break out of the --remote-expr call — see
        # docker/nvim/lua/ballroom_highlight.lua) silently skip instead of
        # actually running. Installing it here is what makes that coverage
        # real in CI rather than only when a contributor happens to have
        # nvim locally.
        run: sudo apt-get update && sudo apt-get install -y neovim
      - name: tutor/chat.sh tests
        run: bash tutor/chat_test.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker build
        run: docker build -f docker/Dockerfile -t ballroom-practice .

  # For every exercise, checks that its hidden tests actually discriminate
  # correct from incorrect code: the shipped starter must FAIL
  # test_command, and exercises/<id>/.reference/'s known-correct solution
  # must PASS it (see internal/verify) — catches a vacuous or too-weak
  # test at any of the exercise's 3 language variants, on every change,
  # not just when the exercise was first authored.
  verify-exercises:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: install clang, python3, pytest
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang python3 python3-pip
          pip3 install --user pytest
      - name: verify exercises
        run: go run ./cmd/verify-exercises .
