name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false # no go.sum yet (stdlib-only); re-enable once real deps land
      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi
      - name: go vet
        run: go vet ./cmd/... ./internal/...
      - name: go build
        run: go build ./cmd/... ./internal/...
      - name: go test
        run: go test ./cmd/... ./internal/...

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck docker/entrypoint.sh tutor/chat.sh tutor/chat_test.sh
      - name: install neovim
        # tutor/chat_test.sh's live RPC checks (the actual verification that
        # untrusted directive content can't break out of the --remote-expr
        # call — see docker/nvim/lua/ballroom_highlight.lua) need a real
        # nvim binary; without it those checks silently skip instead of
        # actually running. Installing it here is what makes that coverage
        # real in CI rather than only when a contributor happens to have
        # nvim locally.
        run: sudo apt-get update && sudo apt-get install -y neovim
      - name: tutor/chat.sh tests
        run: bash tutor/chat_test.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker build
        run: docker build -f docker/Dockerfile -t ballroom-practice .
