# tmux layout for the practice session: editor | terminal / tutor panes.
set -g mouse on
set -g history-limit 5000

# Pane borders: labeled (via `select-pane -T`, set in entrypoint.sh) and
# color-coded so the active pane is obvious at a glance.
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_title} "
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour45,bold

# Status bar: session name on the left, keybinding legend on the right so
# navigation is discoverable without needing to know tmux beforehand.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style bg=colour234,fg=colour250
set -g status-left-length 20
set -g status-left " #[bold,fg=colour45]practice#[default] · #S "
set -g status-right-length 60
set -g status-right "#[fg=colour250]M-1 Editor  M-2 Terminal  M-3 Tutor  ·  M-q submit "

# Direct pane switching, no prefix key required.
bind -n M-1 select-pane -t 0
bind -n M-2 select-pane -t 1
bind -n M-3 select-pane -t 2

# Jump to the terminal pane and pre-type `practice submit` (not run —
# you still confirm with Enter, so a stray keypress can't burn an attempt).
bind -n M-q select-pane -t 1 \; send-keys "practice submit"
