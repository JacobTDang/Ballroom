# tmux layout for the practice session: one window, editor full-width
# across the top with tutor and terminal side by side below it (see
# entrypoint.sh).
set -g mouse on
set -g history-limit 5000

# Forwards terminal focus events into panes -- required for the editor
# pane's FocusGained/FocusLost autocmds (see
# docker/nvim/lua/ballroom_highlight.lua) to fire at all. Covers both
# switching away from/back to the outer terminal application, and
# switching tmux panes (e.g. to the tutor pane and back) without the
# outer terminal window itself losing OS focus -- tmux synthesizes a
# focus event for the latter case too as long as this is on.
set -g focus-events on

# Truecolor passthrough — the palette below is exact hex, not the nearest
# 256-color approximation, so the terminal needs to be told it can render
# 24-bit color through tmux.
set -as terminal-features ",*:RGB"

# Ctrl-Tab has no distinct byte sequence in plain terminal input (Tab is
# already a control character, so "Ctrl+Tab" is indistinguishable from
# plain Tab without an extended-keys protocol) — needed for the C-Tab/
# C-S-Tab pane-cycling binds below to fire instead of silently no-oping.
# Whether it actually reaches here still depends on the *outer* terminal
# app forwarding Ctrl-Tab instead of eating it for its own tab-switching.
set -s extended-keys on

# Bold/saturated retro palette (same hex values as internal/catalog/theme.go
# and internal/tui/styles.go, so the in-session look matches the homepage
# instead of feeling like a separate app):
#   red #F03C3C · orange #F0862E · gold #E8A93C · pink #E0468C
#   purple #9B5FB0 · blue #3C7DC4 · teal #2FA6A6 · cream #F2EBDD

# Status bar: session name on the left (there's only one window, MAIN,
# so tmux's automatic window list has nothing to add in the middle) and
# a keybinding legend on the right so pane navigation is discoverable
# without needing to know tmux beforehand.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=colour234,fg=#F2EBDD"
set -g status-left-length 20
set -g status-left " #[bold,fg=#2FA6A6]ballroom#[default] #[fg=#E0468C]·#[default] #S "
set -g status-right-length 120
set -g status-right "#[fg=#9B5FB0]M-1#[fg=#F2EBDD] Editor  #[fg=#9B5FB0]M-2#[fg=#F2EBDD] Tutor  #[fg=#9B5FB0]M-3#[fg=#F2EBDD] Terminal  #[fg=#E0468C]·#[fg=#F2EBDD]  Ctrl-Tab cycle  M-q submit  M-g reference  M-h highlights  M-0 leave "

# Editor (pane 0) spans the full width across the top; tutor (pane 1)
# and terminal (pane 2) sit side by side underneath, tutor under the
# problem statement and terminal under the editor — one screen, not
# tab-switching, but the editor still gets full width instead of being
# squeezed into a cramped 3-way split. Jump straight to a pane by
# number, or cycle with Ctrl-Tab/Ctrl-Shift-Tab like browser tabs (M-Tab
# kept too, forward-only, for anyone already used to it).
bind -n M-1 select-pane -t :0.0
bind -n M-2 select-pane -t :0.1
bind -n M-3 select-pane -t :0.2
bind -n M-Tab select-pane -t '{next}'
bind -n C-Tab select-pane -t '{next}'
bind -n C-S-Tab select-pane -t '{previous}'

# Jump to the terminal pane and pre-type `ballroom submit` (not run —
# you still confirm with Enter, so a stray keypress can't burn an attempt).
bind -n M-q select-pane -t :0.2 \; send-keys "ballroom submit"

# Leave the session and return to the picker (issue #17). tmux's own
# y/n prompt guards it — same spirit as M-q's type-then-Enter-confirm,
# so a stray M-0 can't kill a session in progress. Killing the session
# ends the attached client (the container's PID 1 via entrypoint.sh's
# `exec tmux attach`), which exits the container; the host orchestrator
# unblocks and the picker resumes — the same teardown `ballroom return`
# (cmd/ballroom's returnToHost) performs from the terminal pane, made
# one keypress and reachable from ANY pane. Leaving without submitting
# abandons the attempt: the host deletes the /workspace temp dir on
# exit by design (see RunExercise), exactly like closing every pane by
# hand.
bind -n M-0 confirm-before -p "leave session and return to the picker? (y/n)" kill-session

# Reveal the reference solution (issue #237). Confirmed the same way
# M-0 is — this spoils the exercise, so a stray M-g can't burn it —
# then jumps to the terminal pane and actually runs `ballroom
# reference` (the confirm dialog above already was the confirmation,
# unlike M-q's own type-then-Enter, so this doesn't need a second one):
# it reveals reference/solution.* into the workspace and opens it in an
# nvim split next to the user's own solution file.
bind -n M-g confirm-before -p "reveal the reference solution? (y/n)" "select-pane -t :0.2 \; send-keys -t :0.2 'ballroom reference' Enter"

# Toggle tutor highlights/notes on/off in the editor pane (issue #25).
# Talks to the editor pane's nvim RPC socket the same way tutor/chat.sh
# does (--server/--remote-expr into ballroom_highlight.lua) — the
# ${NVIM_SOCKET:-...} default matches entrypoint.sh's own resolution of
# the same var, expanded by the shell run-shell spawns rather than baked
# in here as a second hardcoded copy of the path. Resolves correctly
# because entrypoint.sh exports NVIM_SOCKET before starting this tmux
# server (see entrypoint.sh), so it's part of the environment every pane
# -- and every run-shell invocation -- inherits. Hiding only clears
# rendering; the underlying notes/data (and any added while hidden)
# survive and reappear on the next toggle.
bind -n M-h run-shell -b "nvim --server \${NVIM_SOCKET:-/tmp/ballroom-nvim.sock} --remote-expr \"v:lua.require('ballroom_highlight').toggle()\" >/dev/null 2>&1"
