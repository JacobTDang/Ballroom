# tmux layout for the practice session: editor / terminal / tutor, each
# its own full-screen window (see entrypoint.sh).
set -g mouse on
set -g history-limit 5000

# Truecolor passthrough — the palette below is exact hex, not the nearest
# 256-color approximation, so the terminal needs to be told it can render
# 24-bit color through tmux.
set -as terminal-features ",*:RGB"

# Ctrl-Tab has no distinct byte sequence in plain terminal input (Tab is
# already a control character, so "Ctrl+Tab" is indistinguishable from
# plain Tab without an extended-keys protocol) — needed for the C-Tab/
# C-S-Tab window-cycling binds below to fire instead of silently no-oping.
# Whether it actually reaches here still depends on the *outer* terminal
# app forwarding Ctrl-Tab instead of eating it for its own tab-switching.
set -s extended-keys on

# Bold/saturated retro palette (same hex values as internal/catalog/theme.go
# and internal/tui/styles.go, so the in-session look matches the homepage
# instead of feeling like a separate app):
#   red #F03C3C · orange #F0862E · gold #E8A93C · pink #E0468C
#   purple #9B5FB0 · blue #3C7DC4 · teal #2FA6A6 · cream #F2EBDD

# Status bar: session name on the left, the window list in the middle
# (tmux draws this automatically — one tab per window, named in
# entrypoint.sh, current one highlighted) and a keybinding legend on the
# right so navigation is discoverable without needing to know tmux
# beforehand.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=colour234,fg=#F2EBDD"
set -g status-left-length 20
set -g status-left " #[bold,fg=#2FA6A6]ballroom#[default] #[fg=#E0468C]·#[default] #S "
set -g status-right-length 110
set -g status-right "#[fg=#9B5FB0]M-1#[fg=#F2EBDD] Editor  #[fg=#9B5FB0]M-2#[fg=#F2EBDD] Terminal  #[fg=#9B5FB0]M-3#[fg=#F2EBDD] Tutor  #[fg=#E0468C]·#[fg=#F2EBDD]  Ctrl-Tab cycle  M-q submit  M-h highlights "
set -g window-status-current-style "fg=#2FA6A6,bold"

# Editor/Terminal/Tutor each live in their own full-screen window (tab),
# not a split pane — cramped 3-way splits made the editor too narrow to
# read comfortably. Jump straight to one by number, or cycle with
# Ctrl-Tab/Ctrl-Shift-Tab like browser tabs (M-Tab kept too, forward-only,
# for anyone already used to it).
bind -n M-1 select-window -t :0
bind -n M-2 select-window -t :1
bind -n M-3 select-window -t :2
bind -n M-Tab next-window
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

# Jump to the terminal window and pre-type `ballroom submit` (not run —
# you still confirm with Enter, so a stray keypress can't burn an attempt).
bind -n M-q select-window -t :1 \; send-keys "ballroom submit"

# Toggle tutor highlights/notes on/off in the editor window (issue #25).
# Talks to the editor window's nvim RPC socket the same way tutor/chat.sh
# does (--server/--remote-expr into ballroom_highlight.lua) — the socket
# path is the well-known /tmp location entrypoint.sh binds nvim --listen
# to, not something discovered via tmux env propagation (see entrypoint.sh
# for why). Hiding only clears rendering; the underlying notes/data (and
# any added while hidden) survive and reappear on the next toggle.
bind -n M-h run-shell -b "nvim --server /tmp/ballroom-nvim.sock --remote-expr \"v:lua.require('ballroom_highlight').toggle()\" >/dev/null 2>&1"
