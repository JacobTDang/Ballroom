# tmux layout for the practice session: editor | terminal / tutor panes.
set -g mouse on
set -g history-limit 5000

# Truecolor passthrough — the palette below is exact hex, not the nearest
# 256-color approximation, so the terminal needs to be told it can render
# 24-bit color through tmux.
set -as terminal-features ",*:RGB"

# Bold/saturated retro palette (same hex values as internal/catalog/theme.go
# and internal/tui/styles.go, so the in-session look matches the homepage
# instead of feeling like a separate app):
#   red #F03C3C · orange #F0862E · gold #E8A93C · pink #E0468C
#   purple #9B5FB0 · blue #3C7DC4 · teal #2FA6A6 · cream #F2EBDD

# Pane borders: labeled (via `select-pane -T`, set in entrypoint.sh) and
# color-coded so the active pane is obvious at a glance.
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_title} "
set -g pane-border-style fg=colour238
set -g pane-active-border-style "fg=#2FA6A6,bold"

# Status bar: session name on the left, keybinding legend on the right so
# navigation is discoverable without needing to know tmux beforehand.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=colour234,fg=#F2EBDD"
set -g status-left-length 20
set -g status-left " #[bold,fg=#2FA6A6]ballroom#[default] #[fg=#E0468C]·#[default] #S "
set -g status-right-length 90
set -g status-right "#[fg=#9B5FB0]M-1#[fg=#F2EBDD] Editor  #[fg=#9B5FB0]M-2#[fg=#F2EBDD] Terminal  #[fg=#9B5FB0]M-3#[fg=#F2EBDD] Tutor  #[fg=#E0468C]·#[fg=#F2EBDD]  M-Tab cycle  M-q submit "

# Direct pane switching, no prefix key required.
bind -n M-1 select-pane -t 0
bind -n M-2 select-pane -t 1
bind -n M-3 select-pane -t 2

# Cycle through panes with one key, for when you don't want to remember
# which number a pane is.
bind -n M-Tab select-pane -t :.+

# Resize the active pane on the fly. Alt+Shift+arrow rather than plain
# Alt+arrow, since these are unprefixed (fire in every pane) and plain
# Alt+arrow is commonly bound to word-navigation inside shells/editors —
# Alt+Shift avoids stealing that.
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# Jump to the terminal pane and pre-type `ballroom submit` (not run —
# you still confirm with Enter, so a stray keypress can't burn an attempt).
bind -n M-q select-pane -t 1 \; send-keys "ballroom submit"
